<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/png" href="logo.png?v=3">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Rehberlik Koçum </title>
    <link rel="stylesheet" href="blog-style.css">
    <style>
        /* YAZI OKUMA PENCERESİ (MODAL) TASARIMI */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; padding: 20px; }
        .modal-content { background: white; margin: 20px auto; padding: 30px; border-radius: 20px; max-width: 800px; position: relative; line-height: 1.8; }
        .close-btn { position: sticky; top: 0; float: right; font-size: 30px; cursor: pointer; color: #764ba2; font-weight: bold; }
        .modal-body img { max-width: 100%; height: auto; border-radius: 10px; } /* Resimler taşmasın */
        .modal-body h2 { color: #1e3c72; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="blog-container">
        <a href="../index.html" class="back-link">← Ana Sayfaya Dön</a>
        <header class="blog-header">
            <h1>REHBERLİK YAZILARI</h1>
            <p>Sınav sürecine dair makalelerimiz.</p>
        </header>

        <div class="blog-grid" id="blogger-posts">
            <p style="text-align: center;">Yazılar yükleniyor...</p>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePost()">&times;</span>
            <div id="modal-data" class="modal-body">
                </div>
        </div>
    </div>

    <script>
    let allPosts = []; 

    function showPosts(json) {
        let container = document.getElementById('blogger-posts');
        
        // Veri var mı kontrolü
        if (!json.feed || !json.feed.entry) {
            container.innerHTML = '<p style="text-align: center;">Henüz yazı bulunamadı.</p>';
            return;
        }

        allPosts = json.feed.entry; 
        container.innerHTML = ''; 

        for (let i = 0; i < allPosts.length; i++) {
            let entry = allPosts[i];
            
            // BAŞLIK ALMA (Hata korumalı)
            let title = "Başlıksız Yazı";
            if (entry.title && entry.title.$t) {
                title = entry.title.$t;
            }

            // ÖZET ALMA (Hata korumalı)
            let summaryText = "Okumak için tıklayın...";
            let rawContent = "";
            
            if (entry.summary && entry.summary.$t) {
                rawContent = entry.summary.$t;
            } else if (entry.content && entry.content.$t) {
                rawContent = entry.content.$t;
            }

            if (rawContent) {
                // HTML etiketlerini temizle ve ilk 100 karakteri al
                summaryText = rawContent.replace(/<[^>]*>/g, "").substring(0, 100) + "...";
            }

            // Kartı oluştur ve ekrana bas
            container.innerHTML += `
                <div class="post-card" onclick="openPost(${i})" style="cursor:pointer;">
                    <h2>${title}</h2>
                    <p>${summaryText}</p>
                    <span class="read-more">Hemen Oku →</span>
                </div>
            `;
        }
    }

    function openPost(index) {
        let entry = allPosts[index];
        let title = entry.title ? entry.title.$t : "Başlık Yüklenemedi";
        let content = entry.content ? entry.content.$t : (entry.summary ? entry.summary.$t : "İçerik boş.");
        
        document.getElementById('modal-data').innerHTML = `<h2>${title}</h2><div>${content}</div>`;
        document.getElementById('postModal').style.display = "block";
        document.body.style.overflow = "hidden"; 
    }

    function closePost() {
        document.getElementById('postModal').style.display = "none";
        document.body.style.overflow = "auto";
    }
</script>

    <script src="https://rehberlikkocum.blogspot.com/feeds/posts/default?alt=json-in-script&callback=showPosts"></script>
</body>
</html>
